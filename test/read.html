<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dadada — read</title>
  <link rel="stylesheet" href="css/read.css">
</head>
<body>

<div class="read-app">

  <!-- LEFT: IMAGE STAGE -->
  <div class="read-stage">
    <div class="read-stage__frame" id="stageFrame">
      <div class="read-stage__placeholder" id="stagePlaceholder">Loading…</div>
    </div>
    <div class="read-stage__caption" id="stageCaption"></div>
    <div class="read-stage__dots" id="stageDots"></div>
  </div>

  <!-- RIGHT: TEXT COLUMN -->
  <div class="read-text-col">

    <div class="read-topbar">
      <button class="read-topbar__back" onclick="goBackToWork()">← Back</button>
      <div class="mode-tabs" role="group" aria-label="Reading mode">
        <button class="mode-tab" id="tabManual" aria-pressed="true"  onclick="setMode('manual')">Manual scroll</button>
        <button class="mode-tab" id="tabAuto"   aria-pressed="false" onclick="setMode('auto')">Auto-advance</button>
      </div>
      <div class="read-topbar__right">
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
          <span id="voiceIcon">🔊</span><span class="voice-label" id="voiceLabel">Voice on</span>
        </button>
        <button class="read-close" onclick="goBackToWork()" aria-label="Close">×</button>
      </div>
    </div>

    <div class="chapter-index" id="chapterIndex"></div>

    <div class="read-text-track" id="textTrack"></div>

    <div class="auto-bar" id="autoBar">
      <button class="auto-btn" id="prevBtn" onclick="prevChapter()" aria-label="Previous chapter">‹</button>
      <button class="auto-btn auto-btn--play" id="playBtn" onclick="togglePlay()" aria-label="Play">▶</button>
      <button class="auto-btn" id="nextBtn" onclick="nextChapter()" aria-label="Next chapter">›</button>
      <div class="auto-bar__progress"><div class="auto-bar__progress-fill" id="progressFill"></div></div>
      <div class="auto-bar__time" id="autoTime">0 / 0</div>
    </div>

  </div>

  <!-- END OVERLAY -->
  <div class="read-end" id="readEnd">
    <div class="read-end__label">End of essay</div>
    <div class="read-end__title" id="endTitle"></div>
    <div class="read-end__actions">
      <button class="read-end__btn" onclick="restartRead()">Read again</button>
      <button class="read-end__btn read-end__btn--solid" onclick="goBackToWork()">Back to work page</button>
    </div>
  </div>

</div>

<!-- START OVERLAY -->
<div class="read-start" id="readStart">
  <div class="read-start__type" id="startType">Image essay</div>
  <div class="read-start__title" id="startTitle">—</div>
  <div class="read-start__artist" id="startArtist">—</div>
  <div class="read-start__desc" id="startDesc">—</div>

  <div class="read-start__modes" role="group" aria-label="Choose reading mode">
    <button class="read-start__mode-btn" id="startModeManual" aria-pressed="true"  onclick="chooseStartMode('manual')">Manual scroll</button>
    <button class="read-start__mode-btn" id="startModeAuto"   aria-pressed="false" onclick="chooseStartMode('auto')">Auto-advance</button>
  </div>

  <button class="read-start__btn" onclick="beginRead()">Begin reading →</button>
  <div class="read-start__note">Manual scroll: scroll at your own pace — the voice reads each chapter as it becomes active and the image changes to match. Auto-advance: sit back — narration drives the page, hands-free.</div>
</div>

<script src="js/read.js"></script>
</body>
</html>
