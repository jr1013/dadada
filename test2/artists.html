<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dadada — artists</title>
  <link rel="stylesheet" href="css/artists.css">
</head>
<body>

<div class="art-bar">
  <button class="art-bar__back" onclick="goHome()">← dadada</button>
  <div class="art-bar__title" id="barTitle">Artists</div>
  <div class="art-bar__right">
    <button class="art-bar__btn" id="themeBtn" onclick="toggleTheme()">◑</button>
  </div>
</div>

<div id="pgList">
  <div class="artists-header">
    <h1>Artists</h1>
    <span class="artists-header__count" id="artistCount"></span>
  </div>
  <div class="artists-grid" id="artistsGrid"></div>
  <div class="art-footer">
    <span>dadada.in</span><span>Independent artists &amp; practitioners</span>
  </div>
</div>

<div id="pgBio" hidden>
  <div class="bio-layout">
    <div class="bio-left"  id="bioLeft"></div>
    <div class="bio-right" id="bioRight"></div>
  </div>
</div>

<script src="js/artists.js"></script>
</body>
</html>
