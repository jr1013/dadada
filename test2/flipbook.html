<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dadada — flipbook</title>
  <link rel="stylesheet" href="css/flipbook.css">
</head>
<body>

<!-- TOP BAR -->
<div class="fb-bar">
  <button class="fb-bar__back" id="fbBack" onclick="goBack()">← Back</button>
  <div class="fb-bar__title" id="fbTitle"></div>
  <div class="fb-bar__right">
    <button class="fb-bar__btn" id="fbAutoBtn" onclick="toggleAuto()" title="Auto-flip">⏵ Auto</button>
    <button class="fb-bar__btn" id="fbThumbBtn" onclick="toggleThumbs()">⊞ Pages</button>
    <button class="fb-bar__btn" onclick="toggleFullscreen()">⛶</button>
    <button class="fb-bar__btn fb-bar__close" onclick="goBack()">×</button>
  </div>
</div>

<!-- MAIN BOOK STAGE -->
<div class="fb-stage" id="fbStage">

  <!-- Left arrow -->
  <button class="fb-arrow fb-arrow--left" id="arrowLeft" onclick="flipLeft()" aria-label="Previous page">‹</button>

  <!-- The book -->
  <div class="fb-book" id="fbBook">
    <!-- Left page (already read) -->
    <div class="fb-page fb-page--left" id="pageLeft">
      <div class="fb-page__inner">
        <img id="imgLeft" src="" alt="">
        <div class="fb-page__num" id="numLeft"></div>
      </div>
      <!-- Page curl shadow on right edge of left page -->
      <div class="fb-page__shadow-right"></div>
    </div>

    <!-- Flipping page (animates) -->
    <div class="fb-flip" id="fbFlip">
      <div class="fb-flip__front">
        <img id="flipFront" src="" alt="">
        <div class="fb-page__num" id="numFlipFront"></div>
      </div>
      <div class="fb-flip__back">
        <img id="flipBack" src="" alt="">
        <div class="fb-page__num" id="numFlipBack"></div>
      </div>
    </div>

    <!-- Right page (to be read) -->
    <div class="fb-page fb-page--right" id="pageRight">
      <div class="fb-page__inner">
        <img id="imgRight" src="" alt="">
        <div class="fb-page__num" id="numRight"></div>
      </div>
      <!-- Page curl shadow on left edge of right page -->
      <div class="fb-page__shadow-left"></div>
    </div>

    <!-- Book spine -->
    <div class="fb-spine"></div>
  </div>

  <!-- Right arrow -->
  <button class="fb-arrow fb-arrow--right" id="arrowRight" onclick="flipRight()" aria-label="Next page">›</button>

  <!-- Page counter -->
  <div class="fb-counter" id="fbCounter"></div>

  <!-- Drag hint (shown once) -->
  <div class="fb-hint" id="fbHint">Drag the page corner or use arrows to flip</div>
</div>

<!-- THUMBNAIL STRIP -->
<div class="fb-thumbs" id="fbThumbs" hidden>
  <div class="fb-thumbs__grid" id="fbThumbGrid"></div>
</div>

<!-- LOADING -->
<div class="fb-loading" id="fbLoading">
  <div class="fb-loading__text">Opening book…</div>
</div>

<script src="js/flipbook.js"></script>
</body>
</html>
